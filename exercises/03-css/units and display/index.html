<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Relative Units and Display</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1>Example of Relative Units</h1>

  <section class="container">
    <p class="rem">Text with size in rem</p>
    <p class="em">Text with size in em</p>
  </section>

  <section class="boxes">
    <div class="percentage">50% width</div>
    <div class="vw">50vw width</div>
    <div class="vh">20vh height</div>
  </section>

  <section>
    <h2>Display Property</h2>
    <!-- Changed to id to show how it works -->
    <div id="iwa-block">I am a block element</div>
    <span class="inline">I am inline</span>
    <span class="inline">I am also inline</span>
  </section>

</body>

</html>
