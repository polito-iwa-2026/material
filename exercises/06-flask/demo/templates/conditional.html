<!DOCTYPE html>
<html>

<head>
  <title>Conditional example</title>
</head>

<body>
  <h1>Conditional example</h1>
  {% if pusername == "Luigi" %}
    <h2>Ciao, {{pusername}}</h2>
  {% elif pusername == "Juan" %}
    <h2>Hola, {{pusername}}</h2>
  {% else %}
    <h2>Hello, guest</h2>
    <a href="{{ url_for('register') }}">You need to register</a>
  {% endif %}

  <a href="{{ url_for('home') }}">Go back</a>
</body>

</html>
